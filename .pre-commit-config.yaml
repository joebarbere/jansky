# Optional local hooks: install with `pip install pre-commit && pre-commit install`.
# These mirror the CI checks so problems are caught before you push. They are opt-in
# (CI is the source of truth) — run `pre-commit autoupdate` to bump the pinned revs.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # We DELIBERATELY commit notebook outputs (the MkDocs site renders them with
  # `execute: false`, and they include real-data figures), so nbstripout runs with
  # `--keep-output`: it normalises volatile metadata and execution counts to keep
  # diffs readable WITHOUT removing the figures the published site depends on.
  - repo: https://github.com/kynan/nbstripout
    rev: "0.7.1"
    hooks:
      - id: nbstripout
        args: [--keep-output]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: '\.ipynb$'
      - id: trailing-whitespace
        exclude: '\.ipynb$'
      - id: check-yaml
        args: [--unsafe]  # mkdocs.yml uses !!python/name: tags (mkdocs-material)
      - id: check-added-large-files
        # Notebooks legitimately reach ~5 MB with committed real-data figures.
        args: [--maxkb=8000]
