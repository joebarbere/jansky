      - "48. Planning a Radio Observation": notebooks/48_observing_planning.ipynb
      - "5. Hands-on SDR (optional)": notebooks/05_sdr_basics.ipynb
      - "6. Detecting the Hydrogen Line": notebooks/06_hydrogen_line.ipynb
      - "26. Meteor Scatter & Passive Radar": notebooks/26_meteor_scatter.ipynb
      - "27. VLF & the Ionosphere (SuperSID)": notebooks/27_vlf_ionosphere.ipynb
      - "28. GNU Radio Flowgraphs": notebooks/28_gnuradio_flowgraphs.ipynb
