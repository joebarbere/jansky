site_name: jansky
site_description: A hands-on radio astronomy course in Python
site_author: Joe Barbere
repo_url: https://github.com/joebarbere/jansky
repo_name: joebarbere/jansky

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  # Renders the course notebooks directly into the site. The notebooks live in
  # the repo's top-level notebooks/ directory and are surfaced under docs/ via a
  # symlink (docs/notebooks -> ../notebooks) so this single source of truth is
  # both runnable in JupyterLab and published here.
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        # Render ```mermaid fenced blocks as diagrams (Material auto-loads mermaid.js).
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  # MathJax so the LaTeX in the lessons renders.
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Setup: setup.md
  - Visual Tour: visual-tour.md
  - "Part I — Foundations":
      - "1. What is Radio Astronomy?": notebooks/01_what_is_radio_astronomy.ipynb
      - "2. The Physics of Radio Emission": notebooks/02_physics_of_radio_emission.ipynb
      - "3. Signals, Noise & the Radiometer Equation": notebooks/03_signals_noise_radiometer.ipynb
  - "Part II — Instrumentation & Hardware":
      - "4. Antennas & Receivers": notebooks/04_antennas_and_receivers.ipynb
      - "5. Hands-on SDR (optional)": notebooks/05_sdr_basics.ipynb
      - "6. Detecting the Hydrogen Line": notebooks/06_hydrogen_line.ipynb
  - "Part III — Interferometry & Imaging":
      - "7. Why Interferometry?": notebooks/07_why_interferometry.ipynb
      - "8. Aperture Synthesis & the uv-plane": notebooks/08_aperture_synthesis.ipynb
      - "9. Deconvolution & CLEAN": notebooks/09_deconvolution_clean.ipynb
      - "17. Coherent Interferometry (KrakenSDR)": notebooks/17_coherent_interferometry_kraken.ipynb
      - "19. The EHT & VLBI": notebooks/19_eht_and_vlbi.ipynb
  - "Part IV — Real Data & Research":
      - "10. Accessing Open Archives": notebooks/10_open_archives.ipynb
      - "11. HI 21cm & Galactic Rotation": notebooks/11_hi_rotation_curve.ipynb
      - "12. Continuum Imaging with the VLA": notebooks/12_vla_imaging.ipynb
      - "13. Pulsars": notebooks/13_pulsars.ipynb
      - "14. Multi-wavelength Diversion": notebooks/14_multiwavelength.ipynb
      - "15. Capstone": notebooks/15_capstone.ipynb
      - "16. Data Formats & the Ecosystem": notebooks/16_data_formats_and_ecosystem.ipynb
      - "18. Fast Radio Bursts": notebooks/18_fast_radio_bursts.ipynb
  - Reference:
      - Glossary: glossary.md
      - Mathematical Preliminaries: math-preliminaries.md
      - Reading the Notation: notation.md
      - Data Formats & the Ecosystem: data-formats.md
      - Projects, Kits & Hacks: projects.md
      - Field Notes from the Community: field-notes.md
      - Watch on YouTube: videos.md
      - Radio Astronomy on Mastodon: mastodon.md
      - Resources & Institutions: resources.md
      - Radio Telescopes: telescopes.md
      - Bibliography: references.md
      - Landmark Papers by Year: papers-timeline.md
