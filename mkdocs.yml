site_name: jansky
site_description: A hands-on radio astronomy course in Python
site_author: Joe Barbere
site_url: https://joebarbere.github.io/jansky/
repo_url: https://github.com/joebarbere/jansky
repo_name: joebarbere/jansky

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

plugins:
  - search
  # Renders the course notebooks directly into the site. The notebooks live in
  # the repo's top-level notebooks/ directory and are surfaced under docs/ via a
  # symlink (docs/notebooks -> ../notebooks) so this single source of truth is
  # both runnable in JupyterLab and published here.
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        # Render ```mermaid fenced blocks as diagrams (Material auto-loads mermaid.js).
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  # MathJax so the LaTeX in the lessons renders. The local config (loaded first)
  # enables single-dollar inline math, which the notebooks emit; without it the
  # chapters show literal $...$ instead of typeset symbols.
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Rewrites relative notebook/doc links inside rendered notebooks to the site's
# URL form (mkdocs-jupyter leaves them pointing at .ipynb/.md, which 404).
hooks:
  - mkdocs_hooks.py

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Setup: setup.md
  - Learning Paths: learning-paths.md
  - Visual Tour: visual-tour.md
