name: Link check

# The docs cite hundreds of external URLs (papers, archives, telescopes, videos)
# that inevitably rot. lychee checks them on a schedule (and on demand) rather
# than on PRs, so a flaky external host never blocks a merge. Failures open an
# issue listing the dead links to fix.

on:
  schedule:
    # Mondays at 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in docs and README
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --max-concurrency 8 --cache --max-cache-age 1d
            './docs/**/*.md' './*.md' './plans/**/*.md'
          fail: false

      - name: Open an issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken documentation links (lychee)"
          content-filepath: ./lychee/out.md
          labels: docs, automated
