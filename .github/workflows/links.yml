name: Link check

# The docs cite hundreds of external URLs (papers, archives, telescopes, videos)
# that inevitably rot. lychee checks the markdown on a schedule (and on demand)
# rather than on PRs, so a flaky external host never blocks a merge. A second job
# runs the project's own checker over the things lychee can't see from markdown:
# the jansky.data dataset registry and the structured github catalogue YAML (which
# also classifies publisher/SourceForge bot-blocks as warnings, not failures).
# Both open an issue on failure.

on:
  schedule:
    # Mondays at 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check links in docs and README
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress --max-concurrency 8 --cache --max-cache-age 1d
            './docs/**/*.md' './*.md' './plans/**/*.md'
          fail: false

      - name: Open an issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Broken documentation links (lychee)"
          content-filepath: ./lychee/out.md
          labels: docs, automated

  data-urls:
    # Datasets (jansky.data) + the github catalogue YAML — links lychee can't reach
    # from markdown. Uses scripts/check_dataset_urls.py (ok/warn/fail classifier).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync
        run: uv sync

      - name: Check dataset + catalogue URLs
        id: checkurls
        run: |
          set +e
          uv run python scripts/check_dataset_urls.py --github | tee urls-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open an issue on broken URLs
        if: steps.checkurls.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Broken dataset / catalogue URLs (check_dataset_urls)"
          content-filepath: ./urls-report.txt
          labels: docs, automated
