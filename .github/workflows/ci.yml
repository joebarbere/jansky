name: CI

# Fast checks on every PR and push to main: lint, format, unit tests, a Part I
# notebook smoke-test, and a strict docs build. Run across the advertised Python
# range (3.10 and 3.12 — the bounds of requires-python ">=3.10,<3.13").

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (with tui extra so the Textual test runs)
        run: uv sync --extra tui --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Unit tests
        run: uv run pytest

      - name: Notebook smoke-test (Part I)
        run: |
          uv run pytest --nbmake \
            notebooks/01_what_is_radio_astronomy.ipynb \
            notebooks/02_physics_of_radio_emission.ipynb \
            notebooks/03_signals_noise_radiometer.ipynb

      - name: Build docs (strict)
        run: uv run mkdocs build --strict
