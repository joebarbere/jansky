# Machine-readable companion to docs/github.md — the "Radio Astronomy on GitHub" catalogue.
#
# Each entry mirrors a link on that page so the two cannot silently drift
# (tests/test_github_data.py asserts every `url` here also appears in docs/github.md,
# that every `chapters` number maps to a real notebook, and that the schema is valid).
# `scripts/check_dataset_urls.py --github docs/data/radio_github.yml` verifies the URLs are live
# (run via `make check-urls`). Reuse this list programmatically; keep it in sync with the page.
#
# Fields per entry:
#   name      (required) display name
#   url       (required) primary link (unique across the file)
#   kind      (required) one of: org | repo | person | beyond-github
#   category  (required) thematic group (see the distinct values in the file)
#   language  (optional) primary language
#   chapters  (optional) jansky chapter numbers it connects to
#   paper     (optional) {cite, url} a representative/canonical paper

meta:
  source: docs/github.md
  note: >-
    Curated, not exhaustive. Some cornerstone tools live on GitLab/SourceForge/Bitbucket
    (kind "beyond-github").

